---
layout: default
---

<article class="news-post">

  <!-- ⭐ Back Button -->
  <a href="{{ '/news/' | relative_url }}"
     style="
       display:inline-block;
       margin:20px 0 30px 0;
       padding:6px 12px;
       font-size:14px;
       color:#2b6cb0;
       text-decoration:none;
       border:1px solid #2b6cb0;
       border-radius:6px;
     ">
    ← Back to News
  </a>

  <div class="news-header">

    <h1 class="news-title">{{ page.title }}</h1>

    <div class="news-meta">
      <span class="news-date">{{ page.date | date: "%Y-%m-%d" }}</span>

      {% if page.category %}
      <span class="news-category">{{ page.category }}</span>
      {% endif %}
    </div>

  </div>

  {% if page.image %}
  <img src="{{ page.image }}" class="news-detail-image">
  {% endif %}

  <div class="news-content">
    {{ content }}
  </div>

</article>
